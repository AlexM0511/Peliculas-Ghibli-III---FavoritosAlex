<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador Ghibli</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container py-4">
    <h1 class="text-center mb-4">Películas del Studio Ghibli</h1>

    <div class="d-flex justify-content-center mb-4">
      <input
        type="text"
        id="buscador"
        class="form-control buscador"
        placeholder="Buscar película..."
      >
    </div>

    <h2 class="text-center mt-4">Favoritas</h2>
    <div id="favoritas" class="row g-4 justify-content-center"></div>

    <h2 class="text-center mt-5">Resultados</h2>
    <div id="peliculas" class="row g-4 justify-content-center"></div>
  </div>

  <script src="scrip.js"></script>
</body>
</html>
